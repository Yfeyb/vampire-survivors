<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>吸血鬼幸存者</title>
    <style>
        /* --- 完全保留你原始的 400 行精美样式 --- */
        body { margin: 0; padding: 0; background: linear-gradient(135deg, #2c0a13, #1a060a); display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Arial', sans-serif; color: #fff; overflow: hidden; }
        .container { width: 900px; height: 650px; position: relative; }
        #mainMenu { width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; box-shadow: 0 0 30px rgba(220, 20, 60, 0.5); backdrop-filter: blur(10px); border: 2px solid #DC143C; }
        .title { font-size: 48px; color: #FF0000; margin-bottom: 20px; text-shadow: 0 0 15px rgba(220, 20, 60, 0.7); animation: glow 2s infinite alternate; font-weight: bold; text-transform: uppercase; letter-spacing: 3px; }
        @keyframes glow { from { text-shadow: 0 0 10px rgba(220, 20, 60, 0.7); } to { text-shadow: 0 0 20px rgba(220, 20, 60, 1), 0 0 30px rgba(220, 20, 60, 0.8); } }
        
        /* 存档显示样式 */
        #highScoreText { color: #FFD700; margin-bottom: 10px; font-weight: bold; font-size: 18px; text-shadow: 0 0 5px rgba(255, 215, 0, 0.5); }
        
        .subtitle { font-size: 22px; color: #DDD; margin-bottom: 40px; max-width: 80%; }
        .btn { background: linear-gradient(45deg, #DC143C, #B22222); color: white; padding: 15px 40px; border: none; border-radius: 50px; cursor: pointer; margin: 15px; font-size: 18px; transition: all 0.3s; box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3); }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(220, 20, 60, 0.6); }
        
        #characterSelect { width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); border-radius: 15px; display: none; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 0 30px rgba(220, 20, 60, 0.5); backdrop-filter: blur(10px); border: 2px solid #DC143C; }
        .character-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 25px; margin: 20px 0; width: 80%; }
        .character-card { background: linear-gradient(135deg, #2c0a13, #340a15); border: 2px solid #555; border-radius: 15px; padding: 20px; text-align: center; cursor: pointer; transition: all 0.3s; position: relative; overflow: hidden; }
        .character-card.selected { border-color: #FFD700; box-shadow: 0 0 20px rgba(255, 215, 0, 0.5); }
        .character-icon { width: 100px; height: 100px; background: linear-gradient(135deg, #8B0000, #A52A2A); border-radius: 50%; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 40px; border: 3px solid #FFF; }
        
        #gameScreen { width: 100%; height: 100%; background: #000; border-radius: 15px; display: none; flex-direction: column; box-shadow: 0 0 30px rgba(139, 0, 0, 0.5); position: relative; overflow: hidden; }
        canvas { display: block; background: #111; width: 100%; height: 100%; }
        
        .exp-bar-container { position: absolute; top: 0; left: 0; width: 100%; height: 15px; background: #000; z-index: 15; }
        .exp-fill { height: 100%; background: #4169E1; width: 0%; transition: width 0.3s; }
        
        .health-bar { position: absolute; width: 200px; height: 20px; background: #333; border: 2px solid #555; border-radius: 10px; z-index: 20; }
        .health-fill { height: 100%; background: #FF0000; border-radius: 8px; width: 100%; transition: width 0.3s; }
        
        #gameOverScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; text-align: center; }
        #instructionsScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; padding: 40px; text-align: center; border-radius: 15px; }
        .instructions-content { background: rgba(44, 10, 19, 0.8); padding: 30px; border-radius: 15px; border: 1px solid #DC143C; max-width: 600px; }
    </style>
</head>
<body>
    <div class="container">
        <div id="mainMenu">
            <h1 class="title">吸血鬼幸存者</h1>
            <div id="highScoreText">🏆 历史最高纪录：<span id="highScoreValue">0</span></div>
            <p class="subtitle">在黑暗世界中生存，击败成群的敌人！</p>
            <button class="btn" onclick="showCharacterSelect()">选择角色</button>
            <button class="btn" onclick="showInstructions()">游戏说明</button>
        </div>
        
        <div id="characterSelect">
            <h2 style="font-size: 32px; color: #FF0000; margin-bottom: 30px;">选择你的英雄</h2>
            <div class="character-grid" id="characterGrid"></div>
            <button class="btn" onclick="startLoading()">进入战场</button>
        </div>
        
        <div id="gameScreen">
            <div class="exp-bar-container"><div class="exp-fill" id="expFill"></div></div>
            <div style="position: absolute; top: 25px; left: 20px; z-index: 20; font-weight: bold; color: #FFD700;">等级: <span id="levelDisplay">1</span></div>
            <div style="position: absolute; top: 25px; right: 20px; z-index: 20; font-weight: bold; color: #FF0000;">击杀: <span id="killDisplay">0</span></div>
            <div style="position: absolute; top: 55px; right: 20px; z-index: 20; font-weight: bold; color: #FFF;">时间: <span id="timeDisplay">0:00</span></div>
            
            <div class="health-bar" id="playerHealthBar">
                <div class="health-fill" id="healthFill"></div>
            </div>
            
            <canvas id="gameCanvas"></canvas>
            
            <div id="gameOverScreen">
                <h1 style="font-size: 64px; color: #FF0000; margin-bottom: 20px;">战败</h1>
                <div style="font-size: 24px; color: #DDD; margin-bottom: 30px; line-height: 1.6;">
                    角色: <span id="finalCharacter"></span><br>
                    等级: <span id="finalLevel"></span><br>
                    击杀数: <span id="finalKills"></span><br>
                    生存时间: <span id="finalTime"></span>
                </div>
                <button class="btn" onclick="location.reload()">重新开始</button>
            </div>
        </div>

        <div id="instructionsScreen">
            <div class="instructions-content">
                <h2 style="color: #FF0000; margin-bottom: 20px;">游戏说明</h2>
                <p style="text-align: left; line-height: 1.8;">
                    1. 使用 <b>W, A, S, D</b> 或 <b>方向键</b> 移动角色。<br>
                    2. 角色会自动攻击附近的敌人。<br>
                    3. 收集敌人掉落的经验值（蓝色）来升级。<br>
                    4. 升级时可选择不同的强化项。<br>
                    5. 尽可能生存更长时间并获得更高的击杀数！
                </p>
                <button class="btn" onclick="hideInstructions()">返回主菜单</button>
            </div>
        </div>
    </div>

    <script>
        // --- 核心改动 2：初始化存档变量 ---
        let highScore = localStorage.getItem('vampireHighScore') || 0;

        // 角色数据定义
        const characters = [
            { name: "吸血鬼", icon: "🧛", desc: "战斗中恢复生命", damage: 10, speed: 4, health: 120 },
            { name: "战士", icon: "⚔️", desc: "近战防御专家", damage: 12, speed: 3.5, health: 150 },
            { name: "猎人", icon: "🏹", desc: "远程高敏捷", damage: 8, speed: 5, health: 80 },
            { name: "道士三峰", icon: "☯️", desc: "召唤符咒自动攻击", damage: 10, speed: 4, health: 80 }
        ];

        let selectedCharacterIndex = -1;
        let currentCharacter = null;
        let gameRunning = false;
        let score = 0, kills = 0, level = 1, exp = 0, expToNext = 100;
        let startTime, elapsedTime;

        // --- 核心改动 3：游戏结束逻辑 ---
        function gameOver() {
            // 保存最高分
            if (kills > highScore) {
                highScore = kills;
                localStorage.setItem('vampireHighScore', highScore);
                alert("🎉 新纪录！你刷新了最高杀敌数: " + highScore);
            }

            gameRunning = false;
            elapsedTime = (Date.now() - startTime) / 1000;
            
            document.getElementById('finalCharacter').textContent = currentCharacter.name;
            document.getElementById('finalLevel').textContent = level;
            document.getElementById('finalKills').textContent = kills;
            document.getElementById('finalTime').textContent = `${Math.floor(elapsedTime / 60)}:${Math.floor(elapsedTime % 60).toString().padStart(2, '0')}`;
            document.getElementById('gameOverScreen').style.display = 'flex';
        }

        // --- 核心改动 4：窗口加载显示 ---
        window.onload = () => {
            document.getElementById('highScoreValue').textContent = highScore;
            renderCharacterCards();
            resizeCanvas();
            // 这里继续你原来的 gameLoop 调用逻辑
        };

        // 以下保留你原来的 400 行所有逻辑代码 (renderCharacterCards, update, draw, resizeCanvas 等)
        // ... 请确保这部分代码直接粘贴在下面，包括所有的敌人 AI、碰撞检测和道士三峰的技能代码 ...

        function renderCharacterCards() {
            const grid = document.getElementById('characterGrid');
            characters.forEach((char, index) => {
                const card = document.createElement('div');
                card.className = 'character-card';
                card.innerHTML = `
                    <div class="character-icon">${char.icon}</div>
                    <h3 style="margin-bottom: 5px;">${char.name}</h3>
                    <p style="font-size: 14px; color: #AAA;">${char.desc}</p>
                `;
                card.onclick = () => selectCharacter(index);
                grid.appendChild(card);
            });
        }

        function selectCharacter(index) {
            selectedCharacterIndex = index;
            document.querySelectorAll('.character-card').forEach((card, i) => {
                card.classList.toggle('selected', i === index);
            });
        }

        function showCharacterSelect() {
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('characterSelect').style.display = 'flex';
        }

        function startLoading() {
            if (selectedCharacterIndex === -1) {
                alert("请先选择一个角色！");
                return;
            }
            document.getElementById('characterSelect').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'flex';
            startGame();
        }

        function showInstructions() { document.getElementById('instructionsScreen').style.display = 'flex'; }
        function hideInstructions() { document.getElementById('instructionsScreen').style.display = 'none'; }
        function resizeCanvas() {
            const canvas = document.getElementById('gameCanvas');
            canvas.width = 900;
            canvas.height = 600;
        }

        // 假设的 startGame 和 核心逻辑占位（请确保在这里保留你原来的 400 行主体逻辑）
        function startGame() {
            currentCharacter = characters[selectedCharacterIndex];
            gameRunning = true;
            startTime = Date.now();
            // ... 你原来的初始化逻辑 ...
        }
    </script>
</body>
</html>
