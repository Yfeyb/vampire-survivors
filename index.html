<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>吸血鬼幸存者 - 存档增强版</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #2c0a13, #1a060a);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            color: #fff;
            overflow: hidden;
        }
        
        .container {
            width: 900px;
            height: 650px;
            position: relative;
        }
        
        /* 主菜单 */
        #mainMenu {
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-shadow: 0 0 30px rgba(220, 20, 60, 0.5);
            backdrop-filter: blur(10px);
            border: 2px solid #DC143C;
        }
        
        .title {
            font-size: 48px;
            color: #FF0000;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(220, 20, 60, 0.7);
            animation: glow 2s infinite alternate;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        #highScoreDisplay {
            font-size: 18px;
            color: #FFD700;
            margin-bottom: 20px;
            background: rgba(220, 20, 60, 0.2);
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }
        
        @keyframes glow {
            from { text-shadow: 0 0 10px rgba(220, 20, 60, 0.7); }
            to { text-shadow: 0 0 20px rgba(220, 20, 60, 1), 0 0 30px rgba(220, 20, 60, 0.8); }
        }
        
        .subtitle {
            font-size: 20px;
            color: #DDD;
            margin-bottom: 30px;
            max-width: 80%;
        }
        
        .btn {
            background: linear-gradient(45deg, #DC143C, #B22222);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            margin: 10px;
            font-size: 18px;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }
        
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(220, 20, 60, 0.6);
        }

        /* 游戏界面增强 */
        #gameScreen {
            width: 100%;
            height: 100%;
            background: #000;
            border-radius: 15px;
            display: none;
            flex-direction: column;
            box-shadow: 0 0 30px rgba(139, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
        }

        .fullscreen-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            border: 1px solid #555;
            padding: 8px;
            border-radius: 5px;
            cursor: pointer;
            z-index: 100;
            font-size: 12px;
        }

        /* 保持你原有的其他样式不变... */
        #characterSelect { width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); border-radius: 15px; display: none; flex-direction: column; align-items: center; justify-content: center; box-shadow: 0 0 30px rgba(220, 20, 60, 0.5); backdrop-filter: blur(10px); border: 2px solid #DC143C; }
        .character-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 20px 0; width: 90%; }
        .character-card { background: linear-gradient(135deg, #2c0a13, #340a15); border: 2px solid #555; border-radius: 15px; padding: 15px; text-align: center; cursor: pointer; transition: all 0.3s; }
        .character-card.selected { border-color: #FFD700; box-shadow: 0 0 15px rgba(255, 215, 0, 0.5); }
        .character-icon { font-size: 30px; margin-bottom: 10px; }
        canvas { display: block; background: #111; width: 100%; height: 100%; }
        .exp-bar-container { position: absolute; top: 0; left: 0; width: 100%; height: 10px; background: #222; z-index: 100; }
        .exp-fill { height: 100%; background: #4169E1; width: 0%; transition: width 0.3s; }
        .health-bar { position: absolute; width: 60px; height: 6px; background: #333; border: 1px solid #000; z-index: 50; pointer-events: none; }
        .health-fill { height: 100%; background: #ff0000; width: 100%; }
        .level-display { position: absolute; top: 20px; left: 20px; color: #FFD700; font-weight: bold; z-index: 100; font-size: 20px; }
        .kill-count { position: absolute; top: 20px; right: 20px; color: #FF0000; font-weight: bold; z-index: 100; font-size: 20px; }
        .level-up-modal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); border: 2px solid #ff0000; padding: 20px; border-radius: 10px; display: none; z-index: 200; text-align: center; }
        .upgrade-option { background: #333; padding: 10px; margin: 10px; cursor: pointer; border-radius: 5px; }
        .upgrade-option:hover { background: #555; }
        #gameOverScreen { position: absolute; inset: 0; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
    </style>
</head>
<body>
    <div class="container" id="gameContainer">
        <div id="mainMenu">
            <h1 class="title">吸血鬼幸存者</h1>
            <p id="highScoreDisplay">历史最高杀敌: 0</p>
            <p class="subtitle">在黑暗世界中生存，击败成群的敌人！</p>
            <button class="btn" onclick="showCharacterSelect()">开始游戏</button>
            <button class="btn" onclick="resetScore()" style="font-size: 12px; opacity: 0.6;">清除存档</button>
        </div>
        
        <div id="characterSelect">
            <h2 style="color: #ff0000;">选择你的英雄</h2>
            <div class="character-grid" id="charGrid"></div>
            <button class="btn" onclick="confirmCharacterSelection()">进入战场</button>
        </div>
        
        <div id="gameScreen">
            <div class="exp-bar-container"><div class="exp-fill" id="expFill"></div></div>
            <div class="level-display">等级: <span id="levelValue">1</span></div>
            <div class="kill-count">击杀: <span id="killValue">0</span></div>
            
            <canvas id="gameCanvas"></canvas>
            
            <div class="health-bar" id="playerHealthBar">
                <div class="health-fill" id="healthFill"></div>
            </div>

            <button class="fullscreen-btn" onclick="toggleFullScreen()">全屏模式</button>

            <div id="levelUpModal" class="level-up-modal">
                <h3>等级提升！选择一项强化</h3>
                <div id="upgradeOptions"></div>
            </div>

            <div id="gameOverScreen">
                <h1 style="color: #ff0000; font-size: 48px;">战败</h1>
                <p id="finalStats" style="font-size: 20px;"></p>
                <button class="btn" onclick="location.reload()">重新开始</button>
            </div>
        </div>
    </div>

    <script>
        // --- 核心存档变量 ---
        let highScore = localStorage.getItem('vampireHighScore') || 0;

        const characters = [
            { name: "吸血鬼", icon: "🧛", damage: 12, speed: 4, health: 120, special: "吸血" },
            { name: "战士", icon: "⚔️", damage: 15, speed: 3.5, health: 150, special: "高血量" },
            { name: "道士三峰", icon: "☯️", damage: 10, speed: 5, health: 80, special: "高航速" }
        ];

        let selectedChar = 0;
        let gameRunning = false;
        let score = 0;
        let level = 1;
        let exp = 0;
        let expToNext = 50;

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let player, enemies = [], bullets = [], keys = {};

        // 初始化主界面
        window.onload = () => {
            document.getElementById('highScoreDisplay').textContent = `历史最高杀敌: ${highScore}`;
            renderCharSelect();
            resizeCanvas();
        };

        function renderCharSelect() {
            const grid = document.getElementById('charGrid');
            characters.forEach((char, i) => {
                const div = document.createElement('div');
                div.className = `character-card ${i === 0 ? 'selected' : ''}`;
                div.innerHTML = `<div class="character-icon">${char.icon}</div><div>${char.name}</div><div style="font-size:10px; color:#aaa">${char.special}</div>`;
                div.onclick = () => {
                    document.querySelectorAll('.character-card').forEach(c => c.classList.remove('selected'));
                    div.classList.add('selected');
                    selectedChar = i;
                };
                grid.appendChild(div);
            });
        }

        function showCharacterSelect() {
            document.getElementById('mainMenu').style.display = 'none';
            document.getElementById('characterSelect').style.display = 'flex';
        }

        function confirmCharacterSelection() {
            document.getElementById('characterSelect').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'block';
            startGame();
        }

        function startGame() {
            const char = characters[selectedChar];
            player = {
                x: canvas.width/2, y: canvas.height/2,
                ...char, maxHealth: char.health
            };
            gameRunning = true;
            requestAnimationFrame(gameLoop);
        }

        // --- 游戏逻辑 ---
        function gameLoop() {
            if (!gameRunning) return;
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function update() {
            // 移动
            if (keys['w']) player.y -= player.speed;
            if (keys['s']) player.y += player.speed;
            if (keys['a']) player.x -= player.speed;
            if (keys['d']) player.x += player.speed;

            // 限制边界
            player.x = Math.max(20, Math.min(canvas.width-20, player.x));
            player.y = Math.max(20, Math.min(canvas.height-20, player.y));

            // 更新血条位置
            const hb = document.getElementById('playerHealthBar');
            hb.style.left = (player.x - 30) + 'px';
            hb.style.top = (player.y - 40) + 'px';
            document.getElementById('healthFill').style.width = (player.health/player.maxHealth*100) + '%';

            // 生成敌人
            if (Math.random() < 0.03 + (level*0.005)) {
                enemies.push({
                    x: Math.random() < 0.5 ? -20 : canvas.width + 20,
                    y: Math.random() * canvas.height,
                    hp: 20 + (level*5),
                    speed: 1 + Math.random()
                });
            }

            // 敌人AI与碰撞
            enemies.forEach((en, i) => {
                const angle = Math.atan2(player.y - en.y, player.x - en.x);
                en.x += Math.cos(angle) * en.speed;
                en.y += Math.sin(angle) * en.speed;

                if (Math.hypot(player.x - en.x, player.y - en.y) < 30) {
                    player.health -= 0.5;
                    if (player.health <= 0) gameOver();
                }
            });

            // 自动射击最近敌人
            if (enemies.length > 0 && Math.random() < 0.1) {
                const target = enemies[0];
                const angle = Math.atan2(target.y - player.y, target.x - player.x);
                bullets.push({x: player.x, y: player.y, angle: angle, speed: 7});
            }

            // 子弹逻辑
            bullets.forEach((b, bi) => {
                b.x += Math.cos(b.angle) * b.speed;
                b.y += Math.sin(b.angle) * b.speed;
                enemies.forEach((en, ei) => {
                    if (Math.hypot(b.x - en.x, b.y - en.y) < 20) {
                        en.hp -= player.damage;
                        bullets.splice(bi, 1);
                        if (en.hp <= 0) {
                            enemies.splice(ei, 1);
                            score++;
                            exp += 15;
                            checkLevelUp();
                            document.getElementById('killValue').textContent = score;
                        }
                    }
                });
            });
        }

        function checkLevelUp() {
            if (exp >= expToNext) {
                level++;
                exp = 0;
                expToNext *= 1.2;
                document.getElementById('levelValue').textContent = level;
                document.getElementById('levelUpModal').style.display = 'block';
                gameRunning = false;
                
                const opts = document.getElementById('upgradeOptions');
                opts.innerHTML = '';
                ['+伤害', '+速度', '+生命回复'].forEach(type => {
                    const d = document.createElement('div');
                    d.className = 'upgrade-option';
                    d.textContent = type;
                    d.onclick = () => {
                        if(type === '+伤害') player.damage += 5;
                        if(type === '+速度') player.speed += 0.5;
                        if(type === '+生命回复') player.health = Math.min(player.maxHealth, player.health + 40);
                        document.getElementById('levelUpModal').style.display = 'none';
                        gameRunning = true;
                        requestAnimationFrame(gameLoop);
                    };
                    opts.appendChild(d);
                });
            }
            document.getElementById('expFill').style.width = (exp/expToNext*100) + '%';
        }

        function gameOver() {
            gameRunning = false;
            
            // --- 存档逻辑 ---
            let isNewRecord = false;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('vampireHighScore', highScore);
                isNewRecord = true;
            }

            document.getElementById('gameOverScreen').style.display = 'flex';
            document.getElementById('finalStats').innerHTML = `
                击杀数: ${score} ${isNewRecord ? '<span style="color:yellow">(新纪录!)</span>' : ''}<br>
                最终等级: ${level}
            `;
        }

        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            // 玩家
            ctx.font = '30px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(characters[selectedChar].icon, player.x, player.y + 10);
            // 敌人
            ctx.fillStyle = 'red';
            enemies.forEach(en => ctx.fillText('🧟', en.x, en.y + 10));
            // 子弹
            ctx.fillStyle = 'yellow';
            bullets.forEach(b => {
                ctx.beginPath();
                ctx.arc(b.x, b.y, 4, 0, Math.PI*2);
                ctx.fill();
            });
        }

        // 辅助功能
        function resizeCanvas() {
            canvas.width = 900;
            canvas.height = 600;
        }

        function toggleFullScreen() {
            const elem = document.getElementById('gameContainer');
            if (!document.fullscreenElement) {
                elem.requestFullscreen().catch(err => alert(`全屏失败: ${err.message}`));
            } else {
                document.exitFullscreen();
            }
        }

        function resetScore() {
            if(confirm("确定要清空最高纪录吗？")) {
                localStorage.removeItem('vampireHighScore');
                location.reload();
            }
        }

        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
    </script>
</body>
</html>
